strict: true
opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - convenience_type
  - discouraged_object_literal
  - empty_count
  - empty_string
  - explicit_init
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicit_return
  - literal_expression_end_indentation
  - modifier_order
  - multiline_arguments
  - multiline_parameters
  - operator_usage_whitespace
  - override_in_extension
  - redundant_nil_coalescing
  - sorted_imports
  - vertical_whitespace_closing_braces
included:
  - Samsung Remote TV
  - SamsungTVRemoteTests
  - SamsungTVRemoteUITests
analyzer_rules:
  - unused_declaration
  - unused_import
